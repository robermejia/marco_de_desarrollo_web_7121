<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcos de desarrollo web</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            box-sizing: border-box;
        }

        p::selection {
            background-color: rebeccapurple;
            color: yellow;
        }

        header,
        footer {
            text-align: center;
            background-color: #121212;
            color: #fff;
            padding: 1rem 0;
        }

        form {
            margin: 1rem auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            border: thin solid #454545;
            padding: 1rem 0.5rem;
            border-radius: 10px;
            width: min(300px, 80%);
        }

        form * {
            width: 80%;
            border-radius: 10px;
        }

        form input {
            border: thin solid #acacac;
            padding: 0.2rem 0.5rem;
        }

        form button {
            width: auto;
            padding: 0.2rem 1rem;
            background-color: #121212;
            color: #fff;
            border: none;
            font-size: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>Lorem ipsum</h1>
        <h3>dolor sit amet consectetur adipisicing elit.</h3>
    </header>
    <main style="padding: 1rem">
        <p>
            Necessitatibus harum cum hic obcaecati distinctio architecto culpa, ipsa
            labore consequuntur ad iste amet! Totam cupiditate facere quam
            aspernatur sunt, obcaecati ad!
        </p>
        <form>
            <label for="num1">Número #1</label>
            <input type="number" id="num1" />
            <label for="num2">Número #2</label>
            <input type="number" id="num2" />
            <button type="button" onclick="suma()">Sumar</button>
            <p style="text-align: center" id="resultado"></p>
        </form>
    </main>
    <footer>2025 ©</footer>
    <script>
        const suma = () => {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML =
                "Resultado: " + (n1 + n2);
        };
    </script>
</body>

</html>
